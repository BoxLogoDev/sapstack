meta:
  version: 1
  last_updated: "2026-04-11"
  total_entries_rule: "Must be verifiable on SAP Support Portal"
  contribution_guideline: |
    새 Note 추가 시:
    1. SAP Support Portal에서 실제 번호 확인
    2. 제목을 한 줄로 축약 (영문 유지)
    3. keywords는 영문 + 한국어 혼용 가능
    4. category는 dump/config/korea/migration/performance/security 중 선택
