# sapstack — 확정된 SAP Note 매핑 데이터셋
#
# 목적: scripts/resolve-note.sh가 키워드 입력을 받으면 관련 SAP Note 번호를
#       반환합니다. 서브에이전트도 이 파일을 참조해 "SAP Note 섹션"을 채울 수 있습니다.
#
# ⚠️ 중요 원칙:
#   1. 이 파일에는 **확실히 존재하는 Note 번호만** 등록합니다
#   2. 번호가 불확실하면 등록하지 않습니다 (과소가 과잉보다 낫다)
#   3. Note는 SAP Support Portal에서 검색 가능한 실제 번호여야 합니다
#   4. Note의 실제 내용은 SAP Marketplace에서 확인해야 하며, 이 파일은 **포인터**만 제공
#
# 엔트리 형식:
#   - id: SAP Note 번호 (문자열)
#     title: 한 줄 제목
#     keywords: [검색 키워드 배열]
#     modules: [FI, MM, ...]
#     release: both | ecc_only | s4_only
#     category: dump | config | korea | migration | performance | security
#     url: https://launchpad.support.sap.com/#/notes/<번호>

