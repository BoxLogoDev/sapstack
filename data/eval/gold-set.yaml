# data/eval/gold-set.yaml
# sapstack 진단 품질 eval — Gold Set (정답 데이터셋)
#
# 목적:
#   에이전트/커맨드가 대표 증상에 대해 내놓는 진단이 ground-truth 와
#   일치하는지 LLM-judge 로 채점하기 위한 정답셋. "112개 노트 보유"를
#   "진단 정확도 X%"로 바꾸는 측정 기반. (gstack qa/canary 의 SAP판)
#
# 설계 원칙 (ETHOS):
#   1. 단일출처 — 증상 본문은 data/symptom-index.yaml 을 symptom_ref 로 참조.
#      여기엔 *채점용 정답*(primary root cause + 반드시 나와야 할 T-code +
#      검증 포인트)만 얇게 얹는다. 증상 텍스트를 복제하지 않는다.
#   2. Ground-truth — primary_root_cause 는 symptom-index 의 typical_causes
#      첫 항목("제일 흔함")에서 파생. 추측 정답 금지.
#   3. 참조 무결성 — symptom_ref 는 symptom-index 에 실재, must_tcodes 는
#      tcodes.yaml 에 실재해야 한다. scripts/check-eval-goldset.sh 가 강제.
#
# 채점 (scripts/eval-diagnosis.sh → scripts/eval/judge.mjs):
#   - root_cause_match: primary_root_cause 를 답변이 맞혔는가 (full/partial/miss)
#   - tcode_recall: must_tcodes 중 답변에 등장한 비율
#   - check_coverage: must_checks 중 답변이 다룬 비율
#   - ethos_violations: ethos_flags 위반 감지 (하드코딩/ECC·S4 혼동 등)
#
# 스키마: schemas/eval-gold-set.schema.json
#
# 확장:
#   현재 21건(대표 모듈 커버). 목표 30~50건. symptom-index 90건에서
#   ground-truth 가 명확한 것 위주로 확장. 기여 가이드: data/eval/README.md

