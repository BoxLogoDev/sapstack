# data/symptom-index.yaml
# Symptom Index — 자연어 증상 ↔ SAP 모듈·T-code·초기 체크 매핑
#
# 목적:
#   엔드유저/운영자가 입력한 자연어 증상을 빠르게 매칭하여
#   sap-session-start가 Turn 1 INTAKE에서 적절한 힌트를 자동 로드하도록 함.
#
# 사용처:
#   - sap-session-start 커맨드가 fuzzy 매칭
#   - web/triage.html 정적 포털이 브라우저에서 로드하여 1차 진단
#   - MCP 서버의 resolve_symptom 도구 (Slice 7)
#
# 스키마:
#   각 엔트리는 id와 다국어 symptom 필드, 관련 모듈/T-code, 전형적 원인,
#   수집이 필요한 증거 종류, 국가별 로컬라이제이션 힌트를 포함.
#
# 다국어:
#   v0.1은 ko + en 기본. Slice 6에서 de/ja 추가.
#   symptom_{iso}는 없으면 symptom_en으로 폴백.

schema_version: "1.0.0"
generated: 2026-04-12
source: sapstack authors
