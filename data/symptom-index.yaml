      - "신택스 에러(RC=8) — 해당 트포의 코드 문제"
      - "트포 순서가 뒤바뀐 경우 (E070/E071 확인)"
      - "권한 부족(RC=12)"
    evidence_needed:
      - { type: screenshot, target: "STMS import log", priority: critical }
      - { type: transaction_log, target: "SLOG import log text", priority: critical }
    severity: high
    recurrence: frequent

  - id: sym-authorization-missing
    symptom_ko: "T-code 실행하려는데 'You have no authorization' 떠요"
    symptom_ko_variants:
      - "권한 없음 에러"
      - "롤 없어요"
      - "T-code 권한 안 돼요"
      - "노 오쏘라이제이션"
      - "권한 튕겨요"
    symptom_en: "T-code execution fails with 'You have no authorization'"
    likely_modules: [BASIS]
    first_check_tcodes: [SU53, PFCG, SUIM, SU01]
    typical_causes:
      - "롤(PFCG)에 S_TCODE 오브젝트가 안 들어있음"
      - "컴포짓 롤(Composite Role)에서 서브롤 할당 누락"
      - "Organizational Level(회사코드, 플랜트 등) 값이 안 맞음"
      - "SU01에서 사용자 유효기간 만료"
    evidence_needed:
      - { type: screenshot, target: "SU53 after error", priority: critical }
      - { type: screenshot, target: "PFCG role assignment", priority: high }
    severity: medium
    recurrence: frequent

  # ═══════════════════════════════════════════════
  # Performance (2건)
  # ═══════════════════════════════════════════════

  - id: sym-tcode-slow-response
    symptom_ko: "특정 T-code가 평소보다 현저히 느려요"
    symptom_ko_variants:
      - "T-code 느림"
      - "화면 안 떠요 / 오래 걸려요"
      - "리스폰스 느림"
      - "응답 느려요"
      - "특정 트랜잭션 느림"
    symptom_en: "Specific T-code response time significantly degraded"
    likely_modules: [BASIS, ABAP]
    first_check_tcodes: [ST05, SAT, ST12, DB02, ST03N]
    typical_causes:
      - "DB 인덱스 누락이거나 통계가 stale — DB02/DBACOCKPIT 확인"
      - "큰 테이블 풀 스캔 — ST05로 트레이스"
      - "락 웨이트(Lock wait) — DB02/SM12 확인"
      - "메모리 페이징 — ST06"
    evidence_needed:
      - { type: short_dump_trace, target: "ST05 or SAT trace", priority: critical }
      - { type: screenshot, target: "ST03N workload", priority: medium }
    severity: medium
    recurrence: common

  - id: sym-background-job-long-running
    symptom_ko: "백그라운드 잡이 예상보다 오래 걸리거나 멈춰있어요"
    symptom_ko_variants:
      - "SM37 잡 안 끝남"
      - "배치 잡 멈춤"
      - "백그라운드 잡 행(hang)"
      - "잡 돌다 멈췄어요"
    symptom_en: "Background job running longer than expected or stuck"
    likely_modules: [BASIS]
    first_check_tcodes: [SM37, SM50, SM12, ST22]
    typical_causes:
      - "SM12에 락 웨이트가 잡혀있음"
      - "외부 시스템 연동 대기 — RFC/HTTP 타임아웃"
      - "ABAP 덤프 났는데 SM37에는 반영 안 됨"
      - "데이터 볼륨이 평소보다 급증"
    evidence_needed:
      - { type: screenshot, target: "SM37 job log", priority: critical }
      - { type: work_process_sm50, target: "SM50 WP snapshot", priority: high }
    severity: medium
    recurrence: common

  # ═══════════════════════════════════════════════
  # Korea-specific (1건)
  # ═══════════════════════════════════════════════

  - id: sym-kr-etax-invoice-submission-failed
    symptom_ko: "전자세금계산서 국세청 전송 실패해요 (EDOC_COCKPIT)"
    symptom_ko_variants:
      - "이택스 전송 실패"
      - "전자세금계산서 Hometax 에러"
      - "EDOC 코-핏 에러"
      - "국세청 연동 안 돼요"
      - "세금계산서 승인번호 안 떨어짐"
    symptom_en: "Korean e-Tax Invoice submission to NTS failed"
    likely_modules: [FI, BC]
    first_check_tcodes: [EDOC_COCKPIT, SM59, STRUST, SLG1]
    typical_causes:
      - "STRUST 인증서 만료 또는 체인 누락"
      - "SM59 RFC 데스티네이션 접속 실패 — 국세청 Hometax 쪽"
      - "세금계산서 포맷 불일치 (승인번호 체계 바뀐 경우)"
      - "공인인증서 갱신하고 사설 키(PSE) 전환 안 된 경우"
    evidence_needed:
      - { type: screenshot, target: "EDOC_COCKPIT error detail", priority: critical }
      - { type: transaction_log, target: "SLG1 EDOC_KR logs", priority: critical }
      - { type: screenshot, target: "STRUST certificate chain", priority: high }
    localized_checks:
      kr:
        - "국세청 Hometax 점검 시간 (일 03:00-04:00 KST) 확인"
        - "사업자등록번호 (STCD1) 10자리 유효성"
        - "RFC Destination 사설 키 경로 (PSE) 확인"
    severity: critical
    recurrence: occasional

  # ═══════════════════════════════════════════════
  # Integration (1건)
  # ═══════════════════════════════════════════════

  - id: sym-idoc-processing-failure
    symptom_ko: "아이독 상태 51(Application Error)이 왕창 쌓이고 있어요"
    symptom_ko_variants:
      - "IDoc 51 다수 발생"
      - "아이독 처리 실패"
      - "WE02에 51 쌓임"
      - "아이독 쌓여요"
      - "IDoc 어플리케이션 에러"
    symptom_en: "Multiple IDocs in status 51 (Application Error)"
    likely_modules: [BASIS, FI, SD, MM]
    first_check_tcodes: [WE02, WE19, BD87, SM58]
    typical_causes:
      - "파트너 프로파일(WE20) 세팅 누락"
      - "수신 쪽 마스터 데이터 부재 — 벤더·자재·고객 등록 확인"
      - "포트(WE21) 설정 오류"
      - "커스텀 펑션 모듈 런타임 에러"
    evidence_needed:
      - { type: screenshot, target: "WE02 error detail", priority: critical }
      - { type: transaction_log, target: "Affected IDoc XML", priority: critical }
    severity: high
    recurrence: common

