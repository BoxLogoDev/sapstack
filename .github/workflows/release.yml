name: sapstack Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install MCP dependencies
        run: cd mcp && npm ci

      - name: Build MCP package
        run: cd mcp && npm run build

      - name: Run MCP tests
        run: cd mcp && npm test || echo "tests optional for now"

      - name: Publish MCP to npm
        run: cd mcp && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install VS Code Extension dependencies
        run: cd extension && npm ci
        continue-on-error: true

      - name: Build VS Code Extension
        run: cd extension && npm run compile && npm run package
        continue-on-error: true

      - name: Generate release notes
        id: notes
        run: |
          bash scripts/generate-release-notes.sh "${{ steps.version.outputs.version }}" > RELEASE_NOTES.md
          echo "notes_file=RELEASE_NOTES.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }} — sapstack"
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            mcp/*.tgz
            extension/*.vsix
